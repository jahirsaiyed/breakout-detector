name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------- Backend: test + package ----------------
  backend:
    name: Backend (test + package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Unit tests
        run: mvn -B test
      - name: Package (skip tests, already run)
        run: mvn -B -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/breakout-detector-1.0.0.jar
          if-no-files-found: error

  # ---------------- Frontend: build ----------------
  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ---------------- Validate the Docker image (the Render artifact) ----------------
  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push — validates Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: breakout-detector-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------- Deploy backend → Render (main only) ----------------
  deploy-render:
    name: Deploy → Render
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "No RENDER_DEPLOY_HOOK secret set — relying on Render's native Git auto-deploy. Skipping."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Render deploy triggered."

  # ---------------- Deploy frontend → Vercel (main only) ----------------
  deploy-vercel:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Vercel CLI (if token configured)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "No VERCEL_TOKEN secret set — relying on Vercel's native Git integration. Skipping."
            exit 0
          fi
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
