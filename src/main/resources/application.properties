# Server Configuration (PORT env is provided by Render; defaults to 8080 locally)
server.port=${PORT:8080}
server.servlet.context-path=/breakout-detector

# Database Configuration.
# LOCAL default = H2 file (durable). PRODUCTION = Supabase Postgres: override via env vars
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.
# Driver and Hibernate dialect are AUTO-DETECTED from the JDBC URL — do not hardcode them,
# or the Postgres override breaks. See DEPLOYMENT.md.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:file:./data/breakoutdb;AUTO_SERVER=TRUE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# H2 Console (local only; disable in production via H2_CONSOLE_ENABLED=false)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.breakoutdetector=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# WebFlux Configuration
spring.webflux.base-path=/api

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# API Configuration
app.api.version=v1
app.api.title=Breakout Detector API
app.api.description=Stock market breakout detection and analysis tool

# Data Source Configuration
app.data.sources=yahoo,alphavantage,nse,screener,stockanalysis
app.data.default-source=yahoo
app.data.cache-enabled=true
app.data.cache-ttl=300

# Breakout Detection Configuration
app.breakout.rsi-period=14
app.breakout.macd-fast=12
app.breakout.macd-slow=26
app.breakout.macd-signal=9
app.breakout.volume-ma-period=20
app.breakout.price-ma-period=20
app.breakout.resistance-lookback=50

# Backtesting Configuration
app.backtest.initial-capital=100000
app.backtest.position-size=0.1
app.backtest.stop-loss-percent=0.05
app.backtest.take-profit-percent=0.20
app.backtest.max-hold-days=30

# CORS — applied by config/CorsConfig. In production set APP_CORS_ALLOWED_ORIGINS to the
# Vercel URL (comma-separated), e.g. https://your-app.vercel.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Actuator Configuration (Render health check → /breakout-detector/actuator/health)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ---- Long-Base Breakout Scanner (validated flagship signal) ----
# Universe + cached weekly data (reuses research-cache so scans run fast/offline).
app.scan.universe-resource=universe.txt
app.scan.cache-dir=research-cache
# US benchmark = SPY, India benchmark = ^NSEI (regime gate: index above 40-week MA).
app.scan.benchmark-us=SPY
app.scan.benchmark-in=^NSEI
# Only persist candidates scoring in the top tercile (validated edge bucket).
app.scan.min-percentile=0.67
# Weekly scan, Saturday 06:00 (markets closed). Set to empty to disable.
app.scan.cron=0 0 6 * * SAT
# Do NOT run a full live scan on startup by default.
app.scan.run-on-startup=false 