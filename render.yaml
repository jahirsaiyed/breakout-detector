# Render Blueprint — backend API (Docker). Connect this repo in Render → it reads render.yaml.
# Secrets (Supabase DB) are NOT stored here; set them in the Render dashboard (sync: false).
services:
  - type: web
    name: breakout-detector-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /breakout-detector/actuator/health
    autoDeploy: true
    envVars:
      # --- Supabase Postgres (use the SESSION POOLER connection — IPv4, required for Render) ---
      - key: SPRING_DATASOURCE_URL
        sync: false   # jdbc:postgresql://<pooler-host>:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        sync: false   # postgres.<project-ref>
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false   # your Supabase DB password
      # --- CORS: set to your Vercel URL after the frontend is deployed ---
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false   # https://your-app.vercel.app
      - key: H2_CONSOLE_ENABLED
        value: "false"
      # Keep startup fast; trigger scans via the API or the weekly cron.
      - key: APP_SCAN_RUN_ON_STARTUP
        value: "false"
